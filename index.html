<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尧擎轮胎平台 - 骨架系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" stroke="#2c3e50" stroke-width="2"/>
                    <circle cx="20" cy="20" r="8" fill="#3498db"/>
                    <path d="M20 10 V20 L25 25" stroke="#2c3e50" stroke-width="2" stroke-linecap="round"/>
                </svg>
                尧擎轮胎平台
            </div>
            <!-- 关键修复：使用href属性 -->
            <ul class="nav-links">
                <li><a class="nav-link active" href="/">首页</a></li>
                <li><a class="nav-link" href="/smart-tires">智慧轮胎</a></li>
                <li><a class="nav-link" href="/mall">尧擎商城</a></li>
                <li><a class="nav-link" href="/contact">联系我们</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- 首页骨架 -->
        <section id="home" class="section active">
            <div class="hero">
                <div class="container">
                    <div class="hero-title animated fadeInUp"></div>
                    <div class="hero-subtitle animated fadeInUp delay-1"></div>
                    <div class="hero-cta animated fadeInUp delay-2"></div>
                </div>
            </div>
            
            <div class="features">
                <div class="container">
                    <div class="section-title animated fadeIn"></div>
                    <div class="features-grid">
                        <div class="feature-card animated fadeInUp delay-1">
                            <div class="feature-icon"></div>
                            <div class="feature-title"></div>
                            <div class="feature-desc"></div>
                        </div>
                        <div class="feature-card animated fadeInUp delay-2">
                            <div class="feature-icon"></div>
                            <div class="feature-title"></div>
                            <div class="feature-desc"></div>
                        </div>
                        <div class="feature-card animated fadeInUp delay-3">
                            <div class="feature-icon"></div>
                            <div class="feature-title"></div>
                            <div class="feature-desc"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 智慧轮胎骨架 -->
        <section id="smart-tires" class="section">
            <div class="smart-tires">
                <div class="container">
                    <div class="section-title animated fadeIn"></div>
                    
                    <div class="tech-grid">
                        <div class="tech-card animated fadeInUp delay-1">
                            <div class="tech-icon"></div>
                            <div class="tech-title"></div>
                            <div class="tech-desc"></div>
                        </div>
                        <div class="tech-card animated fadeInUp delay-2">
                            <div class="tech-icon"></div>
                            <div class="tech-title"></div>
                            <div class="tech-desc"></div>
                        </div>
                        <div class="tech-card animated fadeInUp delay-3">
                            <div class="tech-icon"></div>
                            <div class="tech-title"></div>
                            <div class="tech-desc"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 尧擎商城骨架 -->
        <section id="mall" class="section">
            <div class="mall">
                <div class="container">
                    <div class="section-title animated fadeIn"></div>
                    <div class="product-grid">
                        <div class="product-card animated fadeInUp delay-1">
                            <div class="product-image"></div>
                            <div class="product-info">
                                <div class="product-name"></div>
                                <div class="product-price"></div>
                                <div class="product-specs"></div>
                                <button class="buy-button">立即购买</button>
                            </div>
                        </div>
                        <div class="product-card animated fadeInUp delay-2">
                            <div class="product-image"></div>
                            <div class="product-info">
                                <div class="product-name"></div>
                                <div class="product-price"></div>
                                <div class="product-specs"></div>
                                <button class="buy-button">立即购买</button>
                            </div>
                        </div>
                        <div class="product-card animated fadeInUp delay-3">
                            <div class="product-image"></div>
                            <div class="product-info">
                                <div class="product-name"></div>
                                <div class="product-price"></div>
                                <div class="product-specs"></div>
                                <button class="buy-button">立即购买</button>
                            </div>
                        </div>
                        <div class="product-card animated fadeInUp delay-4">
                            <div class="product-image"></div>
                            <div class="product-info">
                                <div class="product-name"></div>
                                <div class="product-price"></div>
                                <div class="product-specs"></div>
                                <button class="buy-button">立即购买</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 联系我们骨架 - 已修改联系方式 -->
        <section id="contact" class="section">
            <div class="contact">
                <div class="container">
                    <h2>联系我们</h2>
                    <div class="contact-grid">
                        <div class="contact-form">
                            <form id="contactForm" onsubmit="return false;">
                                <div class="form-group">
                                    <input type="text" id="name" name="name" required>
                                    <label for="name">姓名</label>
                                </div>
                                <div class="form-group">
                                    <input type="tel" id="phone" name="phone" required>
                                    <label for="phone">电话</label>
                                </div>
                                <div class="form-group">
                                    <input type="email" id="email" name="email" required>
                                    <label for="email">邮箱</label>
                                </div>
                                <div class="form-group">
                                    <textarea id="message" name="message" required></textarea>
                                    <label for="message">留言</label>
                                </div>
                                <button type="submit" class="submit-button">发送消息</button>
                            </form>
                            
                            <div id="successMessage" class="success-message" style="display: none;">
                                ✓ 消息已发送！请直接拨打电话 19859828498 与我们联系
                            </div>
                        </div>
                        
                        <div class="contact-info">
                            <h3>联系方式</h3>
                            <p><strong>地址：</strong>华北科技学院</p>
                            <p><strong>电话：</strong>19859828498</p>
                            <p><strong>邮箱：</strong></p>
                            <p><strong>工作时间：</strong>周一至周五 9:00-18:00</p>
                            
                            <div class="alternative-contact" style="margin-top: 1.5rem; padding: 1rem; background: #f8f9fa; border-radius: 8px;">
                                <h4 style="color: #27ae60; margin-bottom: 0.5rem;">推荐联系方式</h4>
                                <p style="font-size: 0.95rem; margin: 0.3rem 0;">
                                    📞 <strong>电话</strong>：19859828498
                                </p>
                                <p style="font-size: 0.95rem; margin: 0.3rem 0;">
                                    📧 <strong>邮箱</strong>：请直接拨打电话联系
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-text"></div>
            <div class="footer-text"></div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
